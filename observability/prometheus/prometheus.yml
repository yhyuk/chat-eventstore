global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    project: chat-eventstore

scrape_configs:
  - job_name: chat-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app1:7081
          - app2:7082

  - job_name: mysql
    static_configs:
      - targets: ["mysql-exporter:9204"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9221"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9190"]
