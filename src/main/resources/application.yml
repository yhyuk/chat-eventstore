spring:
  application:
    name: chat-eventstore
  datasource:
    url: jdbc:mysql://localhost:6306/chat?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6389

server:
  port: ${SERVER_PORT:7081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${APP_INSTANCE_ID:local}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9211/api/v2/spans

app:
  instance-id: ${APP_INSTANCE_ID:local}
  outbox:
    batch-size: 100
    poll-interval-ms: 500
    max-retry: 5
  snapshot:
    event-threshold: 100
  presence:
    ttl-seconds: 30
  recent-cache:
    size: 50

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
